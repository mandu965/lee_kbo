services:
  - type: web
    name: lee_kbo
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    plan: free
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_WEB_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://lee-kbo.onrender.com,http://localhost:3000
      - key: REDIS_URL
        value: redis://localhost:6379/1
      - key: DATABASE_URL
        value: postgresql+asyncpg://placeholder:placeholder@localhost/placeholder
      - key: NEXT_PUBLIC_API_URL
        value: /v1
      - key: INTERNAL_API_URL
        value: http://127.0.0.1:8002/v1
      - key: NEXT_PUBLIC_SITE_URL
        value: https://lee-kbo.onrender.com
    healthCheckPath: /health
    autoDeploy: true
