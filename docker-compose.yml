services:
  db:
    image: postgres:15-alpine
    container_name: kbo_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kbo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kbopass}
      POSTGRES_DB: ${POSTGRES_DB:-kbo_predictor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kbo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kbo_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kbo_api
    env_file:
      - .env
    ports:
      - "8002:8002"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

volumes:
  postgres_data:
